<!DOCTYPE html>
<html>

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="./bootstrap-4.6.1-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./font-awesome-4.7.0/css/font-awesome.min.css">
    <title>WSE2 Launcher</title>
</head>

<body>
    <div class="container-fluid">
        <div id="top-area" class="pt-3 pb-1">
            <div class="row">
                <div class="col-3 col-md-4">
                    <ul class="list-group p-0 mb-0 bg-light text-dark" id="list-pos">

                    </ul>
                    <div id="buttons" class="pt-1">
                        <button class="btn btn-primary btn-sm" id="btn-install">Install</button>
                        <button class="btn btn-primary btn-sm" id="btn-remove">Remove</button>
                        <button class="btn btn-primary btn-sm" id="btn-configure">Configure</button>
                    </div>
                </div>
                <div class="col-9 col-md-8">
                    <img id="module-img">
                </div>
            </div>
        </div>
        <div id="footer">
            <div class="progress" id="prg-bar">
                <div class="progress-bar" role="progressbar" style="width: 0"></div>
            </div>
            <div class="row">
                <div class="col-4">
                    <div class="small text-truncate pt-5" id="version">
                        <!--<strong>WSE2 Launcher Version</strong>: -->
                    </div>
                </div>
                <div class="col-4 text-center">
                    <div class="btn btn-primary btn-lg border border-primary rounded-pill rounded-lg" id="play-btn">
                        <strong>PLAY</strong>
                    </div>
                    <button class="btn text-light" id="settings">
                        <i class="fa fa-cog fa-lg"></i>
                    </button>
                </div>
                <div class="col-4 text-right">
                    <div id="theme">
                        <small>Current Theme: <strong id="theme-source"></strong></small>
                        <br>
                        <button class="btn btn-primary btn-sm" id="toggle-dark-mode">Toggle Mode</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./jquery-3.6.0.min.js"></script>
    <script src="./bootstrap-4.6.1-dist/js/bootstrap.bundle.min.js"></script>
    <script src="./renderer.js"></script>
</body>

</html>
