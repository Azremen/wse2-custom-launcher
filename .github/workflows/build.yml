name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------------------
  # 1. BUILD JOBS (Linux, Windows, macOS)
  # -------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      
      - name: Build Linux
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: npm run dist:linux

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux
          path: |
            dist/*.AppImage
            dist/*.yml
            dist/*.yaml
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      
      - name: Build Windows
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          # Base64 encoded PFX file
          WIN_CSC_LINK: ${{ secrets.CSC_LINK }} 
          # PFX Password
          WIN_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run dist:win

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.yaml
          if-no-files-found: warn

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      
      - name: Build macOS
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: npm run dist:mac

      - name: Upload Mac Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-mac
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.yaml
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # 2. RELEASE JOB (Runs only after ALL builds succeed)
  # -------------------------------------------------------------------------
  publish-release:
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Download all artifacts from previous jobs
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-linux
          path: ./release_assets

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-windows
          path: ./release_assets

      - name: Download Mac Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-mac
          path: ./release_assets

      - name: List Files (Debug)
        run: ls -R ./release_assets

      # -----------------------------------------------------------------------
      # A. Publish to PRIVATE Repo (This Repo)
      # -----------------------------------------------------------------------
      - name: Publish to Private Repository
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Full release with source code."
          allowUpdates: true
          artifacts: "release_assets/*"
          makeLatest: true

      # -----------------------------------------------------------------------
      # B. Publish to PUBLIC Repo (Binaries Only)
      # -----------------------------------------------------------------------
      - name: Publish to Public Repository
        uses: ncipollo/release-action@v1
        with:
          owner: Azremen
          repo: wse2-custom-launcher 
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          tag: ${{ github.ref_name }}
          commit: "main"
          name: Release ${{ github.ref_name }}
          body: "Automated release build."
          allowUpdates: true
          artifacts: "release_assets/*"
          makeLatest: true