name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # -------------------------------------------------------------------------
  # 1. BUILD JOBS (Validation & Compilation)
  # -------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16
      - run: npm ci
      - name: Build Linux
        run: npm run dist:linux -- -p never
      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux
          path: |
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.zip
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16
      - run: npm ci
      - name: Build Windows
        run: npm run dist:win -- -p never
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: |
            dist/*.exe
          if-no-files-found: ignore

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16
      - run: npm ci
      - name: Build macOS
        run: npm run dist:mac -- -p never
      - name: Upload Mac Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-mac
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: ignore

  # -------------------------------------------------------------------------
  # 2. RELEASE JOB (Runs only after ALL builds succeed)
  # -------------------------------------------------------------------------
  publish-release:
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Download all artifacts from previous jobs into one folder
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release_assets
          pattern: artifacts-*
          merge-multiple: true

      - name: List Files (Debug)
        run: ls -R ./release_assets

      # -----------------------------------------------------------------------
      # A. Publish to PRIVATE Repo (Source + Binaries)
      # -----------------------------------------------------------------------
      - name: Publish to Private Repository
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Full release with source code."
          allowUpdates: true
          artifacts: "release_assets/*"
          makeLatest: true

      # -----------------------------------------------------------------------
      # B. Publish to PUBLIC Repo (Binaries Only)
      # -----------------------------------------------------------------------
      - name: Publish to Public Repository
        uses: ncipollo/release-action@v1
        with:
          # TODO: Double check your owner/repo name below
          owner: Azremen
          repo: wse2-custom-launcher 
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          tag: ${{ github.ref_name }}
          commit: "main"
          name: Release ${{ github.ref_name }}
          body: "Automated release build."
          allowUpdates: true
          artifacts: "release_assets/*"
          makeLatest: true
