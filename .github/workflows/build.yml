name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  # -------------------------------------------------------------------------
  # 1. BUILD JOBS (Validation & Compilation)
  # -------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_type == 'tag' && 'production' || 'testing' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      
      # Testing ise: Sadece build (yayınlama yok)
      - name: Build Linux (Test)
        if: github.ref_type != 'tag'
        run: npm run dist:linux -- -p never

      # Production ise: Build ve Yayınla
      - name: Build Linux (Prod)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: npm run dist:linux -- -p always

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux
          path: |
            dist/*.AppImage
            dist/*.yml
            dist/*.yaml
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    environment: ${{ github.ref_type == 'tag' && 'production' || 'testing' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      
      # Testing
      - name: Build Windows (Test)
        if: github.ref_type != 'tag'
        env:
          WIN_CSC_LINK: ${{ secrets.CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run dist:win -- -p never

      # Production
      - name: Build Windows (Prod)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run dist:win -- -p always

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.yaml
          if-no-files-found: ignore

  build-mac:
    runs-on: macos-latest
    environment: ${{ github.ref_type == 'tag' && 'production' || 'testing' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci

      # Testing
      - name: Build macOS (Test)
        if: github.ref_type != 'tag'
        run: npm run dist:mac -- -p never

      # Production
      - name: Build macOS (Prod)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: npm run dist:mac -- -p always

      - name: Upload Mac Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-mac
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.yaml
          if-no-files-found: ignore

  # -------------------------------------------------------------------------
  # 2. RELEASE JOB (Runs only after ALL builds succeed AND only on Tags)
  # -------------------------------------------------------------------------
  publish-release:
    needs: [build-linux, build-windows, build-mac]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Download all artifacts from previous jobs into one folder
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release_assets
          pattern: artifacts-*
          merge-multiple: true

      - name: List Files (Debug)
        run: ls -R ./release_assets

      # -----------------------------------------------------------------------
      # A. Publish to PRIVATE Repo (Source + Binaries)
      # -----------------------------------------------------------------------
      - name: Publish to Private Repository
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Full release with source code."
          allowUpdates: true
          artifacts: "release_assets/*"
          makeLatest: true

      # -----------------------------------------------------------------------
      # B. Publish to PUBLIC Repo (Binaries Only)
      # -----------------------------------------------------------------------
      - name: Publish to Public Repository
        uses: ncipollo/release-action@v1
        with:
          owner: Azremen
          repo: wse2-custom-launcher 
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          tag: ${{ github.ref_name }}
          commit: "main"
          name: Release ${{ github.ref_name }}
          body: "Automated production release."
          allowUpdates: true
          artifacts: "release_assets/*"
          makeLatest: true
